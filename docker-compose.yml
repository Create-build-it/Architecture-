version: '3.8'

networks:
  data-engineering-network:
    driver: bridge

services:
  # Zookeeper für Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - data-engineering-network

  # Apache Kafka Broker (Ingestion)
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - data-engineering-network

  # Apache Spark Master (Processing)
  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/app/data
      - ./processing-service:/app/processing
    networks:
      - data-engineering-network

  # Apache Spark Worker
  spark-worker:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - "SPARK_MASTER=spark://spark-master:7077"
    volumes:
      - ./data:/app/data
      - ./processing-service:/app/processing
    networks:
      - data-engineering-network

  # Ingestion Service (Dein Custom Python Producer)
  ingestion-service:
    build:
      context: ./ingestion-service
    container_name: ingestion-service
    depends_on:
      - kafka
    volumes:
      - ./data:/app/data
    networks:
      - data-engineering-network

  # Storage Service (Dein Custom Python Consumer / HDFS Simulation)
  storage-service:
    build:
      context: ./storage-service
    container_name: storage-service
    depends_on:
      - kafka
    volumes:
      - ./data:/app/data
    networks:
      - data-engineering-network
